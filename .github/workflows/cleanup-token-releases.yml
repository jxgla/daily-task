name: Cleanup old token releases (keep 3 days)

on:
  schedule:
    - cron: "25 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete token releases older than 3 days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP_DAYS: 3
        run: |
          set -euo pipefail

          # keep today + previous 2 days
          CUTOFF=$(date -u -d "$((KEEP_DAYS-1)) days ago" +%Y%m%d)
          echo "Cutoff (keep >=): $CUTOFF"

          gh api "repos/${REPO}/releases?per_page=100" --paginate \
            --jq '.[] | .tag_name' -r |
          while read -r tag; do
            if [[ "$tag" =~ ^tokens-([0-9]{8})$ ]]; then
              d="${BASH_REMATCH[1]}"
              if [[ "$d" < "$CUTOFF" ]]; then
                echo "Deleting old token release: $tag"
                gh release delete "$tag" -y
              fi
            fi
          done
